<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother's Day</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffb6c1, #ffe4e1, #fff0f5);
      text-align: center;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px 0 40px;
      min-height: 100vh;
    }

    img {
      max-width: 100%;
    }

    .card {
      width: calc(100% - 32px);
      max-width: 430px;
      padding: 24px 18px;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      z-index: 2;
      animation: fadeIn 1.2s ease;
    }

    .hidden {
      display: none;
    }

    h1 {
      font-size: 31px;
      color: #c2185b;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    h2 {
      color: #880e4f;
      font-size: 21px;
    }

    p {
      font-size: 17px;
      color: #4a0033;
      line-height: 1.5;
    }

    button {
      margin-top: 14px;
      padding: 14px 24px;
      border: none;
      border-radius: 30px;
      background: #e91e63;
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(233,30,99,0.4);
    }

    .option-btn {
      display: block;
      width: 85%;
      margin: 12px auto;
    }

    .small-note {
      font-size: 14px;
      color: #7b1b4d;
      margin-top: 10px;
      font-style: italic;
    }

    .shy-img {
      width: 105px;
      height: 105px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      animation: shyBounce 2s infinite;
      margin-top: 8px;
    }

    .flower {
      font-size: 46px;
      animation: bounce 2s infinite;
    }

    .gift {
      font-size: 95px;
      cursor: pointer;
      animation: shake 1.2s infinite;
      margin: 20px 0;
    }

    .photo {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 25px;
      border: 6px solid white;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      animation: popOut 1.2s ease;
    }

    .memory-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0;
    }

    .memory-grid img {
      width: 100%;
      height: 135px;
      object-fit: cover;
      border-radius: 18px;
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      animation: floatPhoto 3s ease-in-out infinite;
    }

    .memory-grid img:nth-child(2) { animation-delay: 0.4s; }
    .memory-grid img:nth-child(3) { animation-delay: 0.8s; }
    .memory-grid img:nth-child(4) { animation-delay: 1.2s; }

    .envelope {
      font-size: 95px;
      cursor: pointer;
      animation: bounce 1.8s infinite;
      margin: 20px 0;
    }

    .letter {
      background: #fff8fb;
      padding: 20px;
      border-radius: 18px;
      box-shadow: inset 0 0 15px rgba(233,30,99,0.15);
      animation: openLetter 1.2s ease;
    }

    .final-text {
      font-size: 38px;
      color: #d81b60;
      animation: bigGlow 1.2s infinite alternate;
    }

    .heart, .petal, .confetti, .firework {
      position: fixed;
      z-index: 1;
      pointer-events: none;
    }

    .heart {
      animation: floatUp 6s linear infinite;
    }

    .petal {
      top: -30px;
      animation: fall 8s linear infinite;
    }

    .confetti {
      top: -20px;
      font-size: 20px;
      animation: confettiFall 4s linear forwards;
    }

    .firework {
      font-size: 20px;
      animation: fireworkPop 1.2s ease-out forwards;
    }

    .music-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      padding: 9px 12px;
      font-size: 12px;
      display: none;
      margin: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff80ab; }
      to { text-shadow: 0 0 25px #e91e63; }
    }

    @keyframes bigGlow {
      from { text-shadow: 0 0 15px #ff80ab; }
      to { text-shadow: 0 0 35px #e91e63, 0 0 55px #ff4081; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes shyBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(6deg); }
      50% { transform: rotate(-6deg); }
      75% { transform: rotate(4deg); }
    }

    @keyframes popOut {
      0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
      70% { transform: scale(1.1) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes floatPhoto {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1.5deg); }
    }

    @keyframes openLetter {
      from { transform: scaleY(0.1); opacity: 0; }
      to { transform: scaleY(1); opacity: 1; }
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @keyframes fireworkPop {
      0% {
        transform: translate(0, 0) scale(0.2);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.4);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">Pause Music ⏸️</button>

  <div class="card" id="page1">
    <div class="flower">🌸</div>
    <h1>For My Beautiful Mom</h1>
    <p>I made something special just for you.</p>
    <button onclick="startExperience()">Tap to Open ❤️</button>
  </div>

  <script>
    function startExperience() {
      const music = document.getElementById("bgMusic");
      const musicBtn = document.getElementById("musicBtn");

      music.volume = 0.5;

      music.play()
        .then(() => {
          musicBtn.style.display = "block";
          musicBtn.innerHTML = "Pause Music ⏸️";
        });

      alert("Continue pasting your remaining pages below this section ❤️");
    }

    function toggleMusic() {
      const music = document.getElementById("bgMusic");
      const musicBtn = document.getElementById("musicBtn");

      if (music.paused) {
        music.play();
        musicBtn.innerHTML = "Pause Music ⏸️";
      } else {
        music.pause();
        musicBtn.innerHTML = "Play Music 🎵";
      }
    }

    function createHeart() {
      const heart = document.createElement("div");

      heart.className = "heart";
      heart.innerHTML = Math.random() > 0.5 ? "❤️" : "💖";

      heart.style.left = Math.random() * 95 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
      heart.style.fontSize = (Math.random() * 20 + 16) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    function createPetal() {
      const petal = document.createElement("div");

      petal.className = "petal";
      petal.innerHTML = Math.random() > 0.5 ? "🌸" : "🌷";

      petal.style.left = Math.random() * 95 + "vw";
      petal.style.animationDuration = (Math.random() * 4 + 6) + "s";
      petal.style.fontSize = (Math.random() * 16 + 16) + "px";

      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 10000);
    }

    setInterval(createHeart, 1000);
    setInterval(createPetal, 1300);
  </script>

</body>
</html>
